<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Clicker Bot</title>
    <style>
        body { text-align: center; font-family: Arial, sans-serif; }
        button { padding: 10px 20px; font-size: 16px; margin: 10px; }
    </style>
</head>
<body>
    <h1>Телеграм Бот Кликера</h1>
    <p>Откройте ваш Telegram и начните разговор с ботом!</p>
    <button onclick="startBot()">Начать</button>

    <script>
        function startBot() {
            alert("Напишите /start вашему боту в Telegram.");
        }
    </script>
</body>
</html>
