<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TWG TOKEN</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
            overflow: hidden; /* Скрываем прокрутку */
            background-color: #f0f0f0; /* Светлый фон */
        }
        #score {
            font-size: 36px;
            margin-top: 20px;
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10; /* Для того, чтобы счет был поверх других элементов */
        }
        #click-button {
            position: fixed; /* Позиционируем по отношению к окну */
            top: 50%; /* По вертикали в середине экрана */
            left: 50%; /* По горизонтали в середине экрана */
            transform: translate(-50%, -50%); /* Центрируем кнопку */
            padding: 0; /* Убираем отступы */
            margin: 0; /* Убираем поля */
            border: none; /* Убираем границу */
            background: none; /* Убираем фон */
            cursor: pointer;
        }
        #click-image {
            width: 200px; /* Размер картинки */
            height: 200px; /* Размер картинки */
        }
        #shop-button, #upgrade-button, #auto-income-button, #info-button, #back-button {
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
            margin: 5px;
            display: inline-block; /* Размещение кнопок рядом */
            margin-left: 10px; /* Отступ между кнопками */
        }
        #shop-container {
            margin-top: 50px;
            text-align: center; /* Выравниваем кнопки по центру */
        }
        #buttons-container {
            margin-top: 100px;
        }
        #shop-button { /* Стиль для кнопки Магазина */
            position: fixed;
            bottom: 20px;
            left: 20px;
        }
        #info-button { /* Стиль для кнопки Информация */
            position: fixed;
            bottom: 20px;
            right: 20px;
        }
        footer {
            display: none; /* Скрываем футер */
        }
        #info-container { /* Стиль для блока информации */
            position: fixed;
            bottom: 100px;
            right: 20px;
            background-color: rgba(0, 0, 0, 0.5);
            color: white;
            padding: 10px;
            border-radius: 5px;
            display: none; /* Скрываем по умолчанию */
        }
        #shop-page { /* Стиль для страницы магазина */
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            color: white;
            z-index: 100; /* Чтобы страница была поверх всех */
        }
        #shop-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px;
            background-color: white;
            border-radius: 10px;
            text-align: center;
        }
        #back-button {
            position: fixed;
            bottom: 20px;
            left: 20px;
        }
    </style>
</head>
<body>

    <div id="score">Баланс: 0 TWG</div>

    <div id="click-button">
        <img id="click-image" src="money.png" alt="Клик">
    </div>

    <button id="shop-button">Магазин</button>

    <button id="info-button">Информация</button>

    <div id="info-container">
        <p>Версия: 1.0</p>
        <p>Ник: <span id="player-name">Игрок</span></p>
    </div>

    <div id="shop-page">
        <div id="shop-content">
            <h2>Магазин</h2>
            <button id="upgrade-button">Улучшить (Цена: 10 TWG, +1 клик: 1)</button>
            <button id="auto-income-button">Купить автодоход (Цена: 50 TWG, +1 автодоход: 0)</button>
            <button id="back-button">Назад</button>
        </div>
    </div>

    <script>
        let score = parseInt(localStorage.getItem('score')) || 0;
        let pointsPerClick = parseInt(localStorage.getItem('pointsPerClick')) || 1;
        let autoIncome = parseInt(localStorage.getItem('autoIncome')) || 0;
        let playerName = localStorage.getItem('playerName') || 'Игрок';

        const clickButton = document.getElementById('click-button');
        const upgradeButton = document.getElementById('upgrade-button');
        const autoIncomeButton = document.getElementById('auto-income-button');
        const scoreDisplay = document.getElementById('score');
        const shopButton = document.getElementById('shop-button');
        const shopPage = document.getElementById('shop-page');
        const shopContent = document.getElementById('shop-content');
        const infoButton = document.getElementById('info-button');
        const infoContainer = document.getElementById('info-container');
        const playerNameDisplay = document.getElementById('player-name');
        const backButton = document.getElementById('back-button');

        // Обновление отображения счета
        function updateScore() {
            scoreDisplay.textContent = 'Баланс: ' + score;
            localStorage.setItem('score', score);
        }

        // Обработчик кликов по картинке
        clickButton.addEventListener('click', function() {
            score += pointsPerClick; // Добавляем очки за клик
            updateScore();
        });

        // Функция автодохода (вызывается каждые 1000 миллисекунд (1 секунда))
        function autoIncomeFunction() {
            score += autoIncome;
            updateScore();
        }

        // Обработчик клика по кнопке Магазин
        shopButton.addEventListener('click', function() {
            shopPage.style.display = 'block';
        });

        // Обработчик клика по кнопке информации
        infoButton.addEventListener('click', function() {
            infoContainer.style.display = infoContainer.style.display === 'none' ? 'block' : 'none';
        });

        // Обработчик клика по кнопке "Назад"
        backButton.addEventListener('click', function() {
            shopPage.style.display = 'none';
        });

        // Функция для изменения ника игрока
        function changePlayerName() {
            let newName = prompt("Введите новый ник:");
            if (newName) {
                playerName = newName;
                playerNameDisplay.textContent = playerName;
                localStorage.setItem('playerName', playerName);
            }
        }

        // Добавляем возможность изменения ника
        playerNameDisplay.addEventListener('click', changePlayerName);

        // Запускаем автодоход
        setInterval(autoIncomeFunction, 1000);

        // Обработчик клика по кнопке улучшения
        upgradeButton.addEventListener('click', function() {
            if (score >= 10) {
                score -= 10;
                pointsPerClick++;
                updateScore();
                upgradeButton.textContent = 'Улучшить (Цена: 10 TWG, +1 клик: ' + pointsPerClick + ')';
            } else {
                alert('Недостаточно средств!');
            }
        });

        // Обработчик клика по кнопке автодохода
        autoIncomeButton.addEventListener('click', function() {
            if (score >= 50) {
                score -= 50;
                autoIncome++;
                updateScore();
                autoIncomeButton.textContent = 'Купить автодоход (Цена: 50 TWG, +1 автодоход: ' + autoIncome + ')';
            } else {
                alert('Недостаточно средств!');
            }
        });

        // Сохранение данных в localStorage при выходе с сайта
        window.addEventListener('beforeunload', function() {
            localStorage.setItem('score', score);
            localStorage.setItem('pointsPerClick', pointsPerClick);
            localStorage.setItem('autoIncome', autoIncome);
            localStorage.setItem('playerName', playerName);
        });

        // Обновляем счет при загрузке страницы
        updateScore();
        playerNameDisplay.textContent = playerName;
    </script>

</body>
</html>
