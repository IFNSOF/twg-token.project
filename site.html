<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TWG TOKEN</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
            overflow: hidden;
            background-color: #D3D3D3; /* Светло-серый фон для главной страницы */
        }
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: gray; /* Серый фон */
            color: white; /* Белый текст */
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 36px;
            z-index: 1000; /* Используем высокий z-index, чтобы экран загрузки был на переднем плане */
        }
        #score {
            font-size: 36px;
            margin-top: 20px;
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            color: black; /* Черный текст для контраста */
        }
        #click-button {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 0;
            margin: 0;
            border: none;
            background: none;
            cursor: pointer;
        }
        #click-image {
            width: 200px;
            height: 200px;
        }
        #shop-button, #info-button {
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
            color: white; /* Белый текст для контраста */
            background-color: #333; /* Темно-серый фон */
            border: none; /* Убираем границу */
            position: fixed;
            bottom: 20px;
        }
        #shop-button { /* Кнопка Магазина слева */
            left: 20px;
        }
        #info-button { /* Кнопка Информация справа */
            right: 20px;
        }
        #info-container, #shop-page {
            display: none; /* Скрываем по умолчанию */
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: white; /* Белый фон для контейнера информации и магазина */
            z-index: 100;
            overflow: auto;
            padding: 20px;
            box-sizing: border-box;
        }
        #info-content, #shop-content {
            max-width: 600px;
            margin: auto;
            padding: 20px;
            background-color: #F5F5F5; /* Серый фон для информации и магазина */
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        #close-info-button, #close-shop-button {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
            color: white; /* Белый текст для контраста */
            background-color: #333; /* Темно-серый фон */
            border: none; /* Убираем границу */
        }
        #shop-title {
            font-size: 24px;
            margin-bottom: 20px;
        }
        #telegram-button {
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 20px;
            color: white; /* Белый текст для контраста */
            background-color: #333; /* Темно-серый фон */
            border: none; /* Убираем границу */
            display: block;
            margin-left: auto;
            margin-right: auto;
        }
        .notification {
            background-color: #F5F5F5; /* Серый фон для уведомлений */
            color: black; /* Черный текст */
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.1);
            margin: 10px 0;
        }
        #profile-info {
            position: fixed;
            top: 10px;
            right: 20px;
            color: black;
            font-size: 18px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }
        #profile-info button {
            margin-top: 10px;
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
            color: white;
            background-color: #333;
            border: none;
        }
    </style>
</head>
<body>

    <div id="loading-screen">TWG TOKEN</div> <!-- Экран загрузки -->
    
    <div id="score">Баланс: 0 TWG</div>
    <div id="click-button">
        <img id="click-image" src="money.png" alt="Клик">
    </div>
    <button id="shop-button">Магазин</button>
    <button id="info-button">Информация</button>
    <div id="profile-info">
        <div>Ник: <span id="player-name">Игрок</span></div>
        <div>Статус: <span id="vip-status">Обычный</span></div>
    </div>
    <div id="info-container">
        <div id="info-content">
            <h2>Информация</h2>
            <p>Версия: Beta 1.0</p>
            <p>Ник: <span id="player-name-info">Игрок</span></p>
            <p id="vip-status-info">Статус: Обычный</p>
            <button id="telegram-button">Telegram</button>
            <button id="close-info-button">Закрыть</button>
        </div>
    </div>

    <div id="shop-page">
        <div id="shop-content">
            <h2 id="shop-title">Магазин</h2>
            <button id="upgrade-button">Улучшить (Цена: 10 TWG, +1 клик: 1)</button>
            <button id="auto-income-button">Купить автодоход (Цена: 50 TWG, +1 автодоход: 0)</button>
            <button id="double-points-button">Купить двойные очки на 60 секунд (Цена: 30 TWG)</button>
            <button id="vip-button">Купить VIP статус (Цена: 100 TWG)</button>
            <button id="gold-button">Купить Gold статус (Цена: 200 TWG)</button>
            <button id="daily-bonus-button">Ежедневный бонус</button> <!-- Добавлено в магазин -->
            <button id="close-shop-button">Закрыть</button>
            <div id="daily-bonus-notification" class="notification" style="display: none;">
                Вы уже получили ежедневный бонус сегодня.
            </div>
        </div>
    </div>

    <script>
        // Скрыть экран загрузки после загрузки содержимого
        window.onload = function() {
            document.getElementById("loading-screen").style.display = "none"; // Скрываем экран загрузки
        };

        let score = parseInt(localStorage.getItem('score')) || 0;
        let pointsPerClick = parseInt(localStorage.getItem('pointsPerClick')) || 1;
        let autoIncome = parseInt(localStorage.getItem('autoIncome')) || 0;
        let playerName = localStorage.getItem('playerName') || 'Игрок';
        let isVip = localStorage.getItem('isVip') === 'true'; // Проверяем VIP статус
        let isGold = localStorage.getItem('isGold') === 'true'; // Проверяем Gold статус
        let lastDailyBonusDate = localStorage.getItem('lastDailyBonusDate');

        const clickButton = document.getElementById('click-button');
        const upgradeButton = document.getElementById('upgrade-button');
        const autoIncomeButton = document.getElementById('auto-income-button');
        const doublePointsButton = document.getElementById('double-points-button');
        const vipButton = document.getElementById('vip-button');
        const goldButton = document.getElementById('gold-button');
        const dailyBonusButton = document.getElementById('daily-bonus-button');
        const scoreDisplay = document.getElementById('score');
        const shopButton = document.getElementById('shop-button');
        const infoButton = document.getElementById('info-button');
        const shopPage = document.getElementById('shop-page');
        const infoContainer = document.getElementById('info-container');
        const playerNameDisplay = document.getElementById('player-name');
        const playerNameInfoDisplay = document.getElementById('player-name-info');
        const vipStatusDisplay = document.getElementById('vip-status');
        const vipStatusInfoDisplay = document.getElementById('vip-status-info');
        const closeInfoButton = document.getElementById('close-info-button');
        const closeShopButton = document.getElementById('close-shop-button');
        const telegramButton = document.getElementById('telegram-button');
        const dailyBonusNotification = document.getElementById('daily-bonus-notification');

        function updateScore() {
            scoreDisplay.textContent = `Баланс: ${score} TWG`;
            localStorage.setItem('score', score);
        }

        function updateStatus() {
            if (isVip) {
                vipStatusDisplay.textContent = 'VIP';
                vipStatusInfoDisplay.textContent = 'VIP';
            } else if (isGold) {
                vipStatusDisplay.textContent = 'Gold';
                vipStatusInfoDisplay.textContent = 'Gold';
            } else {
                vipStatusDisplay.textContent = 'Обычный';
                vipStatusInfoDisplay.textContent = 'Обычный';
            }
            localStorage.setItem('pointsPerClick', pointsPerClick);
        }

        function updateDailyBonusNotification() {
            const now = new Date();
            const lastDate = new Date(lastDailyBonusDate);

            if (lastDate.toDateString() === now.toDateString()) {
                dailyBonusNotification.style.display = 'block';
                dailyBonusButton.disabled = true; // Делаем кнопку неактивной
            } else {
                dailyBonusNotification.style.display = 'none';
                dailyBonusButton.disabled = false; // Восстанавливаем активность кнопки
            }
        }

        clickButton.addEventListener('click', function() {
            score += pointsPerClick;
            updateScore();
        });

        function autoIncomeFunction() {
            score += autoIncome;
            updateScore();
        }

        shopButton.addEventListener('click', function() {
            shopPage.style.display = 'block';
            updateDailyBonusNotification();
        });

        dailyBonusButton.addEventListener('click', function() {
            const now = new Date();
            const lastDate = new Date(lastDailyBonusDate);

            if (lastDate.toDateString() === now.toDateString()) {
                alert('Вы уже получили ежедневный бонус сегодня.');
            } else {
                alert('Вы получили 10 TWG в качестве ежедневного бонуса!');
                score += 10;
                updateScore();
                lastDailyBonusDate = now.toDateString();
                localStorage.setItem('lastDailyBonusDate', lastDailyBonusDate);
                updateDailyBonusNotification();
            }
        });

        infoButton.addEventListener('click', function() {
            infoContainer.style.display = 'block';
        });

        closeInfoButton.addEventListener('click', function() {
            infoContainer.style.display = 'none';
        });

        closeShopButton.addEventListener('click', function() {
            shopPage.style.display = 'none';
        });

        telegramButton.addEventListener('click', function() {
            window.open('https://t.me/Tweegy_Project');
        });

        function changePlayerName() {
            let newName = prompt("Введите новый ник:");
            if (newName) {
                playerName = newName;
                playerNameDisplay.textContent = playerName;
                playerNameInfoDisplay.textContent = playerName;
                localStorage.setItem('playerName', playerName);
            }
        }

        playerNameDisplay.addEventListener('click', changePlayerName);

        setInterval(autoIncomeFunction, 1000);

        upgradeButton.addEventListener('click', function() {
            if (score >= 10) {
                score -= 10;
                pointsPerClick++;
                if (isVip || isGold) pointsPerClick++;
                updateScore();
                upgradeButton.textContent = 'Улучшить (Цена: 10 TWG, +1 клик: ' + pointsPerClick + ')';
            } else {
                alert('Недостаточно средств!');
            }
        });

        autoIncomeButton.addEventListener('click', function() {
            if (score >= 50) {
                score -= 50;
                autoIncome++;
                updateScore();
                autoIncomeButton.textContent = 'Купить автодоход (Цена: 50 TWG, +1 автодоход: ' + autoIncome + ')';
                localStorage.setItem('autoIncome', autoIncome);
            } else {
                alert('Недостаточно средств!');
            }
        });

        doublePointsButton.addEventListener('click', function() {
            if (score >= 30) {
                score -= 30;
                updateScore();
            } else {
                alert('Недостаточно средств!');
            }
        });

        vipButton.addEventListener('click', function() {
            if (score >= 100 && !isVip) {
                score -= 100;
                isVip = true;
                updateScore();
                localStorage.setItem('isVip', 'true');
                updateStatus();
            } else if (isVip) {
                alert('У вас уже есть VIP статус!');
            } else {
                alert('Недостаточно средств!');
            }
        });

        goldButton.addEventListener('click', function() {
            if (score >= 200 && !isGold) {
                score -= 200;
                isGold = true;
                updateScore();
                localStorage.setItem('isGold', 'true');
                updateStatus();
            } else if (isGold) {
                alert('У вас уже есть Gold статус!');
            } else {
                alert('Недостаточно средств!');
            }
        });

        window.addEventListener('beforeunload', function() {
            localStorage.setItem('score', score);
            localStorage.setItem('pointsPerClick', pointsPerClick);
            localStorage.setItem('autoIncome', autoIncome);
            localStorage.setItem('playerName', playerName);
            localStorage.setItem('isVip', isVip);
            localStorage.setItem('isGold', isGold);
            localStorage.setItem('lastDailyBonusDate', lastDailyBonusDate);
        });

        updateScore();
        updateStatus();
        updateDailyBonusNotification();
        playerNameDisplay.textContent = playerName;
        playerNameInfoDisplay.textContent = playerName;
    </script>
</body>
</html>
